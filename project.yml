name: VibeRes
options:
  bundleIdPrefix: sk.moravcik
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.8.0"
    CURRENT_PROJECT_VERSION: "15"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

schemes:
  VibeRes:
    build:
      targets:
        VibeRes: all
        VibeResTests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - VibeRes
      targets:
        - VibeResTests

targets:
  VibeRes:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: VibeRes
    info:
      path: VibeRes/Info.plist
      properties:
        CFBundleDisplayName: VibeRes
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026 Michal Moravčík. MIT License."
        # Tell macOS which UI languages the bundle ships. The String Catalog
        # at VibeRes/Resources/Localizable.xcstrings provides en/sk/de copy;
        # without this list, the system will only ever pick the development
        # language and translated catalog entries are silently ignored.
        CFBundleLocalizations:
          - en
          - sk
          - de
        CFBundleAllowMixedLocalizations: true
        # Re-add NSScreenCaptureUsageDescription only when (and if) the live
        # screenshot preview is actually implemented. Until then, declaring an
        # unused permission is misleading and would trip privacy reviewers.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sk.moravcik.VibeRes
        PRODUCT_NAME: VibeRes
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES

  VibeResTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: VibeResTests
    dependencies:
      - target: VibeRes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sk.moravcik.VibeResTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
    scheme:
      testTargets:
        - VibeResTests
      gatherCoverageData: true

  viberes-cli:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    productName: viberes
    sources:
      # Reuse the Core layer instead of duplicating the logic.
      - path: VibeRes/Core
      - path: VibeResCLI
    settings:
      base:
        PRODUCT_NAME: viberes
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
